name: Update Fights

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      force_discord_test:
        description: "Send Discord notification even if fights.json did not change"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  update-fights:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_MENTION_USER_ID: ${{ secrets.DISCORD_MENTION_USER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run fight update pipeline
        env:
          PIPELINE_SUMMARY_PATH: .tmp/pipeline-summary.json
        run: npm run update:fights

      - name: Detect fight data changes
        id: detect_changes
        run: |
          if git diff --quiet -- data/fights.json data/manualFights.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide notification behavior
        id: notify_decision
        run: |
          FORCE_INPUT="${{ github.event.inputs.force_discord_test || 'false' }}"
          if [ "${{ steps.detect_changes.outputs.changed }}" = "true" ] || [ "$FORCE_INPUT" = "true" ]; then
            echo "notify=true" >> "$GITHUB_OUTPUT"
          else
            echo "notify=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug notification state
        run: |
          echo "data_changed=${{ steps.detect_changes.outputs.changed }}"
          echo "force_discord_test=${{ github.event.inputs.force_discord_test || 'false' }}"
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            echo "discord_webhook_configured=true"
          else
            echo "discord_webhook_configured=false"
          fi
          echo "will_notify=${{ steps.notify_decision.outputs.notify }}"

      - name: Commit and push if data changed
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fights.json data/manualFights.json
          git commit -m "chore(data): automated fight update"
          git push

      - name: Notify Discord on updates
        if: steps.notify_decision.outputs.notify == 'true' && env.DISCORD_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          if [ "${{ steps.detect_changes.outputs.changed }}" = "true" ]; then
            export NOTIFY_REASON="data-changed"
          else
            export NOTIFY_REASON="manual-test"
          fi
          node <<'NODE'
          const fs = require("fs");
          async function main() {
            const raw = JSON.parse(fs.readFileSync("data/fights.json", "utf8"));
            const fights = raw && raw.fights && typeof raw.fights === "object"
              ? Object.entries(raw.fights).map(([id, fight]) => ({ id, ...(fight || {}) }))
              : [];
            const summaryPath = ".tmp/pipeline-summary.json";
            const summaryFromScript = fs.existsSync(summaryPath)
              ? JSON.parse(fs.readFileSync(summaryPath, "utf8"))
              : null;

            const placeholderPatterns = [
              /google\.com\/search/i,
              /espn\.com\/boxing\/story/i,
              /espn\.com\/mma\/fightcenter/i,
            ];

            const missing = fights.filter((fight) => {
              const link = String(fight?.link || "").trim();
              if (!link) return true;
              return placeholderPatterns.some((pattern) => pattern.test(link));
            });

            const sampleLines = missing
              .slice(0, 6)
              .map((fight) => {
                const red = fight?.fighters?.red || "Unknown";
                const blue = fight?.fighters?.blue || "Unknown";
                const date = String(fight?.dateUTC || "").slice(0, 10) || "unknown-date";
                return `${red} vs ${blue} (${date})`;
              });

            const totalFights = summaryFromScript?.totalFights ?? fights.length;
            const newFights = summaryFromScript?.newFights ?? 0;
            const updatedFights = summaryFromScript?.updatedFights ?? 0;
            const deletedPastFights = summaryFromScript?.deletedPastFights ?? 0;
            const status = summaryFromScript?.status || "OK";
            const completedAt = summaryFromScript?.completedAt || new Date().toISOString();
            const missingFightCards = summaryFromScript?.missingFightCards ?? missing.length;
            const workflowUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const title =
              process.env.NOTIFY_REASON === "manual-test"
                ? "Fight Data Check (Manual Discord Test)"
                : "Fight Data Updated";

            const statusColor = status === "UPDATED" ? 16750848 : 5763719;

            const descriptionLines = [];
            if (sampleLines.length > 0) {
              descriptionLines.push("Missing link examples:");
              descriptionLines.push(...sampleLines.map((line) => `- ${line}`));
              if (missing.length > sampleLines.length) {
                descriptionLines.push(`- ...and ${missing.length - sampleLines.length} more`);
              }
            }

            const mentionText = process.env.DISCORD_MENTION_USER_ID
              ? `<@${process.env.DISCORD_MENTION_USER_ID}>`
              : "";

            const payload = {
              content: mentionText || undefined,
              allowed_mentions: process.env.DISCORD_MENTION_USER_ID
                ? { users: [process.env.DISCORD_MENTION_USER_ID] }
                : { parse: [] },
              embeds: [
                {
                  title,
                  color: statusColor,
                  fields: [
                    {
                      name: "Pipeline Totals",
                      value: `${totalFights} fights | ${newFights} new | ${updatedFights} updated | ${deletedPastFights} past deleted`,
                    },
                    { name: "Status", value: status, inline: true },
                    { name: "Missing Fight Cards", value: String(missingFightCards), inline: true },
                    { name: "Completed At", value: completedAt },
                    { name: "Workflow", value: `[Open Run](${workflowUrl})` },
                  ],
                  description:
                    descriptionLines.length > 0
                      ? descriptionLines.join("\n").slice(0, 1000)
                      : undefined,
                },
              ],
            };

            const res = await fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!res.ok) {
              const text = await res.text();
              throw new Error(`Discord webhook failed: ${res.status} ${text}`);
            }
          }

          main().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE
